version: 2

updates:
  # ── npm: web ─────────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    groups:
      nextjs:
        patterns: ["next", "next-auth", "react*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "postcss*"]

  # ── npm: Node.js services ────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /services/auth-service
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: npm
    directory: /services/lms-service
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: npm
    directory: /services/notification-service
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: npm
    directory: /services/helpdesk-service
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: npm
    directory: /services/sync-service
    schedule: { interval: weekly, day: monday }

  - package-ecosystem: npm
    directory: /services/credentials-service
    schedule: { interval: weekly, day: monday }

  # ── pip: ai-service ──────────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /services/ai-service
    schedule:
      interval: weekly
      day: monday

  # ── gradle: Android ──────────────────────────────────────────────────────────
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
