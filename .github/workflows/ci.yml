name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Web (Next.js) ─────────────────────────────────────────────────────────────
  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder-min-32-chars-ok
          NEXTAUTH_URL: http://localhost:3000
          AUTH_SERVICE_URL: http://localhost:4001
          LMS_SERVICE_URL: http://localhost:4002
          NOTIFICATION_SERVICE_URL: http://localhost:4003
          HELPDESK_SERVICE_URL: http://localhost:4004
          SYNC_SERVICE_URL: http://localhost:4005
          AI_SERVICE_URL: http://localhost:4006
          CREDENTIALS_SERVICE_URL: http://localhost:4007

  # ── Node.js services (matrix) ─────────────────────────────────────────────────
  node-services:
    name: ${{ matrix.service }} — typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - lms-service
          - notification-service
          - helpdesk-service
          - sync-service
          - credentials-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  # ── ai-service (Python) ───────────────────────────────────────────────────────
  ai-service:
    name: ai-service — lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/ai-service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: flake8 lint
        run: python -m flake8 app/

      - name: mypy type check
        run: python -m mypy app/ --ignore-missing-imports

  # ── Unit tests (auth · lms · credentials) ─────────────────────────────────────
  unit-tests:
    name: ${{ matrix.service }} — unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - lms-service
          - credentials-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

  # ── Docker builds (verify all images compile) ────────────────────────────────
  docker-build:
    name: Docker — ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [web, node-services, unit-tests, ai-service]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: web
            target: runner
          - name: auth-service
            context: services/auth-service
            target: production
          - name: lms-service
            context: services/lms-service
            target: production
          - name: notification-service
            context: services/notification-service
            target: production
          - name: helpdesk-service
            context: services/helpdesk-service
            target: production
          - name: sync-service
            context: services/sync-service
            target: production
          - name: ai-service
            context: services/ai-service
            target: runner
          - name: credentials-service
            context: services/credentials-service
            target: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: false
          tags: ux-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # ── Android ───────────────────────────────────────────────────────────────────
  android:
    name: Android — assemble debug
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Assemble debug APK
        run: gradle assembleDebug
        env:
          GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
