name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  # ── Build + Push all images to GHCR ─────────────────────────────────────────
  push-images:
    name: Push — ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            context: web
            target: runner
          - name: auth-service
            context: services/auth-service
            target: production
          - name: lms-service
            context: services/lms-service
            target: production
          - name: notification-service
            context: services/notification-service
            target: production
          - name: helpdesk-service
            context: services/helpdesk-service
            target: production
          - name: sync-service
            context: services/sync-service
            target: production
          - name: ai-service
            context: services/ai-service
            target: runner
          - name: credentials-service
            context: services/credentials-service
            target: production
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ux-${{ matrix.name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  # ── Deploy to staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: push-images
    environment:
      name: staging
      url: https://staging.universidadx.com
    steps:
      - uses: actions/checkout@v4

      - name: Write .env.staging
        run: |
          cat > .env.staging << 'EOF'
          POSTGRES_DB=universidadx
          POSTGRES_USER=${{ secrets.STAGING_DB_USER }}
          POSTGRES_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          MONGO_USER=${{ secrets.STAGING_MONGO_USER }}
          MONGO_PASSWORD=${{ secrets.STAGING_MONGO_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          NEXTAUTH_SECRET=${{ secrets.STAGING_NEXTAUTH_SECRET }}
          NEXTAUTH_URL=https://staging.universidadx.com
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=ghcr.io/${{ github.repository_owner }}
          EOF

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: GITHUB_SHA,GITHUB_ACTOR
          script: |
            set -e
            cd /opt/universidadx

            # Pull latest compose file
            git fetch origin main && git reset --hard origin/main

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

            # Rolling update — pull new images and restart changed services
            export IMAGE_TAG=$GITHUB_SHA
            export REGISTRY=ghcr.io/${{ github.repository_owner }}
            docker compose -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose -f docker-compose.yml -f docker-compose.staging.yml \
              up -d --remove-orphans --no-build

            # Health check
            sleep 15
            docker compose ps --format json | \
              python3 -c "
            import sys, json
            services = [json.loads(l) for l in sys.stdin]
            unhealthy = [s['Name'] for s in services if s.get('Health') == 'unhealthy']
            if unhealthy:
                print('UNHEALTHY:', unhealthy); sys.exit(1)
            print('All services healthy')
            "

      - name: Notify success
        if: success()
        run: |
          echo "::notice title=Deploy OK::Staging updated to ${{ github.sha }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error title=Deploy Failed::Staging deploy failed for ${{ github.sha }}"
